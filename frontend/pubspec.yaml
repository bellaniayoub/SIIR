name: frontend
description: SIIR - Intelligent Car Rental Marketplace for the Moroccan market (B2C & B2B).
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.6

  # Google Sign-In & Auth
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.0.0

  # State Management & DI
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Network
  http: ^1.2.0

  # Localization & Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation (for Riverpod, dynamic styling if needed)
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Enable assets for images (e.g., logo, car listings)
  assets:
    - assets/images/
    - assets/icons/
